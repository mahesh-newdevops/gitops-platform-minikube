apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-application
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: minikube-workloads
spec:
  project: minikube-workloads
  source:
    repoURL: https://github.com/mahesh-newdevops/monitoring-application.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
